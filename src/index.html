<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Today's Weather</title>
    <script src="index.js" defer></script>
  </head>
  <body>
    <h1>Weather App</h1>
    <form id="weather-form">
      <div class="fields">
        <input type="text" id="weather-loc-field" name="weather-loc-field" placeholder="Enter Location" />
        <button type="submit" id="weather-search-btn">Search</button>
      </div>
      <div class="error">
        <span class="error-msg"></span>
      </div>
    </form>

    <div class="display"></div>
  </body>
</html>
